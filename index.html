<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Markdown Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="logo">Pro<span>Markdown</span></div>
        <div class="actions">
            <button id="download-btn" class="btn">Download .md</button>
        </div>
    </header>

    <main class="editor-container">
        <section class="pane">
            <div class="label">Editor</div>
            <textarea id="markdown-input" placeholder="Type # Heading to start..."></textarea>
        </section>

        <section class="pane">
            <div class="label">Preview</div>
            <div id="preview-output" class="preview"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
